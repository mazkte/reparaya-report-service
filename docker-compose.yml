services:

  # ── Redpanda (Kafka) ─────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: reparaya-redpanda
    restart: unless-stopped
    ports:
      - "19092:19092"
      - "9080:9080"
    command:
      - redpanda
      - start
      - --kafka-addr=0.0.0.0:19092
      - --advertise-kafka-addr=localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --smp=1
      - --memory=256M
      - --overprovisioned
    deploy:
      resources:
        limits:
          memory: 384m
    networks:
      - reparaya-net

  # ── report-service ───────────────────────────────────────────
  report-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    image: reparaya/report-service:latest
    container_name: reparaya-report-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      KEYCLOAK_URL: https://keycloak-production-c638.up.railway.app
      KEYCLOAK_REALM: reparaya
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:19092
      JAVA_OPTS: "-Xms32m -Xmx200m"
      SPRING_PROFILES_ACTIVE: "dev"
    deploy:
      resources:
        limits:
          memory: 300m
    depends_on:
      - redpanda
    networks:
      - reparaya-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  reparaya-net:
    driver: bridge