services:

  # ── report-service ───────────────────────────────────────────
  report-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    image: reparaya/report-service:latest
    container_name: reparaya-report-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      KEYCLOAK_URL: https://keycloak-production-c638.up.railway.app
      KEYCLOAK_REALM: reparaya
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:19092
      JAVA_OPTS: "-Xms32m -Xmx200m"
      SPRING_PROFILES_ACTIVE: "dev"
    deploy:
      resources:
        limits:
          memory: 300m
    networks:
      - reparaya-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  reparaya-net:
    external: true
    name: reparaya-network