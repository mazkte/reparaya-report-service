server:
  port: 8082

spring:
  application:
    name: report-service
  data:
    mongodb:
      uuid-representation: java-legacy
      uri: ${MONGODB_URI}
      database: reparaya
      auto-index-creation: true     # crea índices 2dsphere automáticamente

  # ── Keycloak ──────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}
          jwk-set-uri: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs

  # ── Kafka (Upstash) ───────────────────────────────────────
  kafka:
    bootstrap-servers: ${UPSTASH_KAFKA_BOOTSTRAP}
    properties:
      sasl.mechanism: ""
      security.protocol: PLAINTEXT


# ── Actuator ────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# ── OpenAPI ──────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Logging ──────────────────────────────────────────────────
logging:
  level:
    pe.edu.reparaya: DEBUG
    org.springframework.security: INFO
    org.springframework.kafka: INFO
    org.apache.kafka.clients.NetworkClient: ERROR
